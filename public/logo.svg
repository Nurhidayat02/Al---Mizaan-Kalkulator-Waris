<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Full Bleed Green Background (Professional Emerald) -->
  <rect width="512" height="512" fill="#0E7E4E"/>
  
  <!-- Premium Gold Gradient -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="40%" stop-color="#F59E0B"/>
      <stop offset="70%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Centered, High-Detail Gold Scales -->
  <g transform="translate(64, 64) scale(0.75)" filter="url(#softGlow)">
    <!-- Central Pillar -->
    <path d="M256 460V60" stroke="url(#goldGrad)" stroke-width="24" stroke-linecap="round"/>
    <circle cx="256" cy="60" r="28" fill="url(#goldGrad)"/>
    <rect x="206" y="440" width="100" height="32" rx="16" fill="url(#goldGrad)"/>
    
    <!-- Main Beam -->
    <path d="M50 140C150 100 362 100 462 140" stroke="url(#goldGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>
    
    <!-- Left Scale -->
    <g transform="translate(50, 140)">
      <path d="M0 0L-80 220M0 0L80 220" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>
      <path d="M-100 220C-100 280 100 280 100 220H-100Z" fill="url(#goldGrad)"/>
    </g>
    
    <!-- Right Scale -->
    <g transform="translate(462, 140)">
      <path d="M0 0L-80 220M0 0L80 220" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>
      <path d="M-100 220C-100 280 100 280 100 220H-100Z" fill="url(#goldGrad)"/>
    </g>
  </g>
</svg>
