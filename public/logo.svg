  </g>

  <!-- Clear "Al-Mizaan" Branding Text -->
  <text x="256" y="450" text-anchor="middle" font-family="'Times New Roman', serif" font-size="82" font-weight="600" fill="#4B5563">Al-Mizaan</text>
