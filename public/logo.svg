<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Green Background Circle -->
  <circle cx="256" cy="200" r="180" fill="#065F46"/>
  
  <!-- Gradient for Gold Scales -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Scales of Justice Icon (Path adapted for Al-Mizaan) -->
  <g transform="translate(141, 85) scale(2.5)" fill="url(#goldGradient)">
    <path d="M16 16c0 1.1-0.9 2-2 2H2c-1.1 0-2-0.9-2-2 0-3.3 2.7-6 6-6h4c3.3 0 6 2.7 6 6z"/>
    <path d="M46 16c0 1.1-0.9 2-2 2H32c-1.1 0-2-0.9-2-2 0-3.3 2.7-6 6-6h4c3.3 0 6 2.7 6 6z"/>
    <path d="M23 4v44h-2V4h2z" transform="translate(10, 0)"/>
    <path d="M1 12l22-8 22 8" stroke="url(#goldGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="24" cy="4" r="2"/>
    <!-- Pans -->
    <path d="M8 12l-4 6h8l-4-6zm32 0l-4 6h8l-4-6z" stroke="url(#goldGradient)" stroke-width="1"/>
  </g>

  <!-- Al-Mizaan Text -->
  <text x="50%" y="460" text-anchor="middle" font-family="serif, Georgia" font-size="70" font-weight="500" fill="#4B5563">Al-Mizaan</text>
